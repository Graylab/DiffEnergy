# @package _global_
checkpoint: checkpoints/diffenergy_tr_0.ckpt
out_dir: ../likelihood_results/likelihoodv3/dfmdock_trtrained_deterministic/3integrand_diff_piecewise_ode
sigma_min: 0.1
sigma_max: 30
clamp_diffusion_coefficient: False
pdb_dir: ../sample_results/dfmdock_inference_trtrained_deterministic
data_samples: ../sample_results/dfmdock_inference_trtrained_deterministic/samples.csv
trajectory_dir: ../sample_results/dfmdock_inference_trtrained_deterministic/trjs
trajectory_index_file: ../sample_results/dfmdock_inference_trtrained_deterministic/trjs/trajectory_index.csv

offset_type: "Translation"

integrand_types:
  TotalIntegrand:
  TimeIntegrand:
  SpaceIntegrand:
prior_fns:
  smax_gaussian

tr_type: non_conservative

path_type: piecewise_trajectories
num_interpolants: 1

integral_type: 'diff'
integration:
  integral_type: ode
  method: rk4
  rtol: 1e-4
  atol: 1e-4

num_workers: 4

save_trajectories: True
save_trajectory_likelihoods: True

deterministic_score: True