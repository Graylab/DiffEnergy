# @package _global_
checkpoint: checkpoints/diffenergy_tr_0.ckpt
out_dir: results/likelihood/dfmdock_forwardsde_ensembled_odeint
sigma_min: 0.1
sigma_max: 30
clamp_diffusion_coefficient: False
pdb_dir: results/sample_results/dfmdock/pdb
data_samples: results/sample_results/dfmdock/samples.csv

offset_type: "Translation"
tr_type: non_conservative

integrand_types:
  TotalIntegrand:
  FlowIntegrand:
prior_fns:
  smax_gaussian
  receptor_smax_gaussian

path_type: forward_sde
sde_steps: 40
num_replicates: 15

integral_type: piecewise_ode
integration:
  method: rk4

save_trajectories: True
save_trajectory_likelihoods: True

deterministic_score: True

