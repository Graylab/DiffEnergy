# @package _global_
checkpoint: checkpoints/diffenergy_tr_0.ckpt
out_dir: results/likelihood/dfmdock_diff_piecewise_ode
sigma_min: 0.1
sigma_max: 30
clamp_diffusion_coefficient: False
pdb_dir: results/sample_results/dfmdock/pdb
data_samples: results/sample_results/dfmdock/samples.csv
trajectory_dir: results/sample_results/dfmdock/trajectories
trajectory_index_file: results/sample_results/dfmdock/trajectories/trajectory_index.csv

offset_type: "Translation"
tr_type: non_conservative

integrand_types:
  TotalIntegrand:
  FlowIntegrand:
prior_fns:
  smax_gaussian
  receptor_smax_gaussian
path_type: sde_trajectories

integral_type: piecewise_ode #divide the SDE path into a set of linear segments, each fully differentiable along their length enabling ODE integration
integration: #each piecewise path is integrated via ode solver using these parameters
  method: rk4
  rtol: 1e-5
  atol: 1e-5

save_trajectories: True
save_trajectory_likelihoods: True

deterministic_score: True